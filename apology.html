<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Letter For You</title>

<style>
body{
margin:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:auto;
}

/* floating hearts */
.heart{
position:absolute;
font-size:18px;
animation:floatUp linear forwards;
opactiy:0.8;
}

@keyframes floatUp{
0%{transform:translateY(100vh) scale(.6);opacity:0}
20%{opacity:1}
100%{transform:translateY(-10vh) scale(1.4);opacity:0}
}

/* envelope */
#envelope{
animation:spinEnvelope 6s linear infinite;
background:white;
padding:30px 40px;
border-radius:14px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
text-align:center;
max-width:320px;
animation:fadeIn .8s ease;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
}

.yes{background:#ff6b81;color:white}
.no{background:#333;color:white}

/* letter */
#letter{
display:none;
background:white;
padding:40px;
max-width:620px;
line-height:1.7;
border-radius:16px;
box-shadow:0 25px 50px rgba(0,0,0,.3);
}

#text{
white-space:pre-line;
font-size:18px;
}

/* burn effect */
#burn{
display:none;
font-size:22px;
color:#300;
animation:burn 3s forwards;
}

@keyframes burn{
0%{opacity:1;transform:scale(1)}
100%{opacity:0;transform:scale(.2) rotate(15deg)}
}

@keyframes spinEnvelope{
0%{transform:rotate(0deg)}
50%{transform:rotate(3deg)}
100%{transform:rotate(0deg)}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<div id="envelope">
<h2>💌 A Letter For Nakiyah</h2>
<p>Do you want to open it?</p>

<button class="yes" onclick="openLetter()">Yes</button>
<button class="no" onclick="burnLetter()">No</button>

<div id="burn">The letter burns away... 🔥</div>
</div>

<div id="letter">
<h1>Hey beautiful </h1>

<div id="text"></div>

<p><strong>From Kareem ❤️</strong></p>
</div>

<!-- music loads after click -->
<div id="music"></div>

<script>

const message = `Nakiyah,

Before you read this, I just want you to know this letter comes from my heart.

Lately I've been thinking about the way I've spoken and acted, and I realize that instead of simply apologizing, I said things that made me seem ungrateful. That was wrong, and I'm truly sorry.

The truth is… I appreciate you more than my words sometimes show. You are someone incredibly special in my life. Your patience, your care, and the love you give me are things I never want to take for granted.

If my words ever made you feel unappreciated or hurt, please know that was never my intention. I regret that deeply. You deserve to feel valued, loved, and respected every single day.

I'm learning from this, and I promise to grow and become better for us. What we have means too much to me to let my pride or careless words damage it.

I hope you can forgive me and allow us to move forward stronger than before.`;


function typeWriter(text, element, speed=35){
let i=0;
function typing(){
if(i < text.length){
element.innerHTML += text.charAt(i);
i++;
setTimeout(typing,speed);
}
}
typing();
}

function openLetter(){

// show letter
const env=document.getElementById("envelope");
const letter=document.getElementById("letter");

env.style.display="none";
letter.style.display="block";

// typewriter effect
const textEl=document.getElementById("text");
textEl.innerHTML="";
typeWriter(message,textEl);

// start music
const music=document.getElementById("music");
music.innerHTML=`<iframe width="0" height="0" src="https://www.youtube.com/embed/z9WaH0ZaKTw?autoplay=1&loop=1&playlist=z9WaH0ZaKTw" allow="autoplay"></iframe>`;

// heart explosion
for(let i=0;i<25;i++) createHeart();
}

function burnLetter(){
let burn=document.getElementById("burn");
burn.style.display="block";
setTimeout(()=>{
document.getElementById("envelope").innerHTML="<h2>The letter is gone...</h2>";
},2000);
}

function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*18+14)+"px";
heart.style.animationDuration=(Math.random()*4+5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},7000);
}

</script>

</body>
</html>
